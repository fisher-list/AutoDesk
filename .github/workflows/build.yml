name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Build Tauri app
        run: |
          cd client
          npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            client/src-tauri/target/release/bundle/nsis/*.exe
            client/src-tauri/target/release/bundle/msi/*.msi

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Build Tauri app
        run: |
          cd client
          npm run tauri build

      - name: Create ZIP
        run: |
          cd client/src-tauri/target/release/bundle/macos
          zip -r AutoDesk_macOS.zip AutoDesk.app

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: client/src-tauri/target/release/bundle/macos/AutoDesk_macOS.zip

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows-build

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: macos-build

      - name: List files
        run: |
          echo "Windows files:"
          ls -la windows-build/
          echo "macOS files:"
          ls -la macos-build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: AutoDesk ${{ github.ref_name }}
          body: |
            ## AutoDesk ${{ github.ref_name }}
            
            跨平台远程控制软件
            
            ### 功能特性
            - ✅ P2P 连接，低延迟传输
            - ✅ 键盘鼠标远程控制
            - ✅ 剪贴板同步
            - ✅ 支持 Windows 和 macOS
            
            ### 下载说明
            - **Windows**: 下载 `AutoDesk_0.1.0_x64-setup.exe` (推荐) 或 `.msi` 安装包
            - **macOS**: 下载 `AutoDesk_macOS.zip`，解压后运行 `AutoDesk.app`
          files: |
            windows-build/*.exe
            windows-build/*.msi
            macos-build/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
